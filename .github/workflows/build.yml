name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal && rustup component add rust-src && rustup default stable

      - name: Install Solana
        run: sh -c "$(curl -sSfL https://release.anza.xyz/stable/install)" && echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Build programs
        run: |
          cargo install cargo-build-sbf
          PATH="$HOME/.cargo/bin:$PATH" cargo build-sbf --manifest-path programs/veil_auction/Cargo.toml

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: anchor-build
          path: |
            target/deploy/
            target/idl/
            target/types/
