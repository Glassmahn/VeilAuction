name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        run: rustup toolchain install 1.86.0 --profile minimal && rustup component add rust-src --toolchain 1.86.0-x86_64-unknown-linux-gnu && rustup default 1.86.0

      - name: Cache Rust deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Solana
        run: sh -c "$(curl -sSfL https://release.anza.xyz/v2.2.1/install)" && echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Build programs
        run: cargo build-sbf --manifest-path programs/veil_auction/Cargo.toml
