[toolchain]
anchor_version = "0.32.1"
solana_version = "2.2.1"
package_manager = "yarn"

[features]
resolution = true
skip-lint = false

[programs.devnet]
veil_auction = "zTkNvsczL8Uvg97KDFKo1PTnPSi8RdAKryyd7d3f2H4"

[programs.localnet]
veil_auction = "DKhS1u3qVR5WytmuVT1mc6cZnj5QiybXnRWBr7x2yaae"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 \"tests/**/*.ts\""

[test]
startup_wait = 20000
shutdown_wait = 2000
upgradeable = false
